<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Karo — Der Fahrzeugmarkt für Wuppertal & NRW</title>
    <meta
      name="description"
      content="Autos kaufen & verkaufen in Wuppertal und NRW. Inserieren in 60 Sekunden per KI-Chat — einfacher und schneller als überall sonst."
    />
  </head>
  <body>
    <div id="root"></div>

    <!-- Google-Website-Übersetzer: Übersetzung in 100+ Sprachen.
         Versteckter Container; gesteuert über den eigenen Sprach-Umschalter. -->
    <div id="google_translate_element" style="display: none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: "de", autoDisplay: false },
          "google_translate_element"
        );
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
